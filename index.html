<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Physics Sandbox</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="toolbar" id="toolbar">
    <div class="shape-strip" id="shapeStrip" role="group" aria-label="Shape selection">
      <button class="shape-btn active" data-shape="rectangle" type="button" title="Rectangle" aria-label="Rectangle">
        <span class="shape-icon icon-rectangle" aria-hidden="true"></span>
      </button>
      <button class="shape-btn" data-shape="circle" type="button" title="Circle" aria-label="Circle">
        <span class="shape-icon icon-circle" aria-hidden="true"></span>
      </button>
      <button class="shape-btn" data-shape="triangle" type="button" title="Triangle" aria-label="Triangle">
        <span class="shape-icon icon-triangle" aria-hidden="true"></span>
      </button>
      <button class="shape-btn" data-shape="pentagon" type="button" title="Pentagon" aria-label="Pentagon">
        <span class="shape-icon icon-pentagon" aria-hidden="true"></span>
      </button>
      <button class="shape-btn" data-shape="hexagon" type="button" title="Hexagon" aria-label="Hexagon">
        <span class="shape-icon icon-hexagon" aria-hidden="true"></span>
      </button>
      <button class="shape-btn" data-shape="bar" type="button" title="Line / Bar" aria-label="Line or bar">
        <span class="shape-icon icon-bar" aria-hidden="true"></span>
      </button>
    </div>

    <button id="bombTool" type="button">Bomb Tool</button>
    <button id="clearBtn" type="button">Clear Tool</button>

    <label>
      Color
      <input id="colorPicker" type="color" value="#56e39f">
    </label>

    <button id="pauseBtn" type="button">Pause Physics</button>

    <label class="range-control speed-control">
      Speed
      <input id="speedSlider" type="range" min="0.5" max="2" step="0.1" value="1">
      <span class="range-value" id="speedValue">1.0x</span>
    </label>

    <label class="range-control">
      Strength
      <input id="strengthSlider" type="range" min="0.5" max="2.5" step="0.1" value="1">
      <span class="range-value" id="strengthValue">1.0x</span>
    </label>

    <label class="range-control">
      Bomb
      <input id="bombPowerSlider" type="range" min="0.5" max="2.5" step="0.1" value="1">
      <span class="range-value" id="bombPowerValue">1.0x</span>
    </label>
  </header>

  <main id="appRoot"></main>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
